
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6ec,#f4d3ff,#d8c8ff);
    overflow-x:hidden;
    color:#4a235a;
}

/* ผีเสื้อลอย */
.butterfly{
    position:fixed;
    font-size:30px;
    animation:fly 12s linear infinite;
    opacity:.8;
}

.b1{
    top:15%;
    left:-10%;
    animation-delay:0s;
}

.b2{
    top:45%;
    left:-20%;
    animation-delay:4s;
}

.b3{
    top:70%;
    left:-15%;
    animation-delay:8s;
}

@keyframes fly{
    from{
        transform:translateX(0) translateY(0) rotate(0deg);
    }
    to{
        transform:translateX(130vw) translateY(-80px) rotate(25deg);
    }
}

/* เมนู */
nav{
    width:100%;
    padding:18px;
    background:rgba(255,255,255,.35);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    gap:35px;
}

nav a{
    color:#7b2cbf;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

nav a:hover{
    color:#ff4fa3;
}

/* เนื้อหา */
.hero{
    min-height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:30px;
}

.profile{
    width:190px;
    height:190px;
    border-radius:50%;
    border:6px solid white;
    box-shadow:0 0 30px #ff9ed2;
    object-fit:cover;
}

h1{
    margin-top:25px;
    font-size:48px;
    color:#b5179e;
}

h3{
    margin-top:10px;
    color:#7b2cbf;
}

p{
    max-width:700px;
    margin-top:20px;
    line-height:1.8;
    font-size:18px;
}

button{
    margin-top:35px;
    padding:15px 40px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#ff66c4,#b5179e);
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px #ff66c4;
}

footer{
    text-align:center;
    padding:20px;
    background:rgba(255,255,255,.35);
}
</style>

</head>
<body>

<div class="butterfly b1">🦋</div>
<div class="butterfly b2">🦋</div>
<div class="butterfly b3">🦋</div>

<nav>
    <a href="#">หน้าหลัก</a>
    <a href="#">personal.html</a>
    <a href="#">ผลงาน</a>
    <a href="#">กิจกรรม</a>
    <a href="#">ติดต่อ</a>
</nav>

<section class="hero">

<img src="images/profile.jpg" class="profile" alt="รูปโปรไฟล์">

<h1>Portfolio</h1>

<h3>นางสาว กานต์ศุภา - พิทักษ์ศิลาธร</h3>

<p>
ยินดีต้อนรับสู่เว็บไซต์ Portfolio ของฉัน 🌸
เว็บไซต์นี้รวบรวมประวัติส่วนตัว ผลงาน กิจกรรม
และความสามารถต่าง ๆ เพื่อใช้ประกอบการศึกษาต่อ
และแนะนำตัวเอง
</p>

<button>เข้าสู่ Portfolio ✨</button>

</section>

<footer>
🦋 Thank you for visiting my Portfolio 🦋
</footer>
